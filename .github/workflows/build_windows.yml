name: Build Windows EXE

# 当代码有更新，或者手动点击时触发打包
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4  # <-- 这里升级成了 v4

    - name: Set up Python
      uses: actions/setup-python@v5  # <-- 这里也升级到最新版
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame==2.5.2
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "KanaBeat" --add-data "game_assets;game_assets/" game.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4  # <-- 这里升级成了 v4
      with:
        name: KanaBeat-Windows
        path: dist/KanaBeat/
